spring.application.name=backend-employee
server.port=8080

# Exposes /actuator/health for Kubernetes liveness/readiness probes
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true

# --- Database ---
# Env vars have local defaults so this runs standalone via docker-compose.
# In Kubernetes, these same env var names get populated from a Secret
# (e.g. via the Secrets Store CSI driver) instead of the defaults below.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/employeedb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:employee_app}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:changeme}

# "update" auto-creates/updates the table from the Employee entity - fine for
# this learning setup; a real production app would use migrations instead
# (Flyway/Liquibase) and set this to "validate".
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
